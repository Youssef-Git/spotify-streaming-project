services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.12
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - spotify-network

  kafka:
    image: confluentinc/cp-kafka:7.6.12
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - spotify-network


  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - spotify-network


  postgres:
    image: postgres:15.17
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - spotify-network    


  airflow:
    image: apache/airflow:3.1.7
    container_name: airflow
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-databricks boto3"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./simulator:/opt/airflow/simulator
      - ./kafka:/opt/airflow/kafka
    networks:
      - spotify-network
    command: >
      bash -c "airflow db migrate && airflow standalone"    


  simulator:
    image: python:3.11-slim
    container_name: simulator
    depends_on:
      - kafka
    volumes:
      - ./simulator:/app/simulator
      - ./kafka:/app
    working_dir: /app
    command: >
      bash -c "pip install kafka-python && python producer.py"
    networks:
      - spotify-network


  consumer:
    image: python:3.11-slim
    container_name: consumer
    depends_on:
      - kafka
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./kafka:/app
      - ./simulator:/app/simulator
    working_dir: /app
    command: >
      bash -c "pip install kafka-python boto3 && python consumer.py"
    networks:
      - spotify-network


networks:
  spotify-network:
    driver: bridge